name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Run linter
        run: |
          flake8 --max-line-length=120 --exclude=venv,__pycache__,.git --ignore=W292,W391 .

      - name: Run unit tests
        env:
          MONGO_URI: mongodb://localhost:27017/testdb
          GEMINI_API_KEY: test-key-for-ci
          SECRET_KEY: ci-test-secret
        run: |
          pytest tests/ -v --tb=short

      - name: Build Docker image
        run: |
          docker build -t smartnotes:ci .

      - name: Smoke test container
        run: |
          docker run -d --name smartnotes-test -p 5000:5000 \
            -e MONGO_URI=mongodb://localhost:27017/testdb \
            -e GEMINI_API_KEY=test-key \
            -e SECRET_KEY=test-secret \
            smartnotes:ci
          sleep 5
          curl -f http://localhost:5000/health || exit 1
          docker stop smartnotes-test
          docker rm smartnotes-test
